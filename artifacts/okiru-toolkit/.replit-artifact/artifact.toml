kind = "web"
previewPath = "/"
title = "Okiru AI Tool Advisor"
version = "1.0.0"
id = "artifacts/okiru-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18230

[services.development]
run = "pnpm --filter @workspace/okiru-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/okiru-toolkit", "run", "build" ]
publicDir = "artifacts/okiru-toolkit/dist/public"
serve = "static"

[services.env]
PORT = "18230"
BASE_PATH = "/"
